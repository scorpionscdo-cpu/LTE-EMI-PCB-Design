<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>사칙연산 계산기</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: linear-gradient(135deg, #2b2d42 0%, #1a1a2e 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
    }
    .calculator {
      width: 100%;
      max-width: 340px;
      background: #1f2235;
      border-radius: 20px;
      padding: 20px;
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
    }
    .display {
      background: #15172b;
      border-radius: 14px;
      padding: 20px;
      margin-bottom: 16px;
      text-align: right;
      overflow: hidden;
    }
    .display .history {
      color: #6c7293;
      font-size: 0.95rem;
      min-height: 1.2em;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .display .current {
      color: #fff;
      font-size: 2.6rem;
      font-weight: 600;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .buttons {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
    }
    button {
      border: none;
      border-radius: 12px;
      padding: 18px 0;
      font-size: 1.3rem;
      font-weight: 600;
      cursor: pointer;
      color: #fff;
      background: #2e3150;
      transition: filter 0.15s, transform 0.05s;
    }
    button:hover { filter: brightness(1.2); }
    button:active { transform: scale(0.95); }
    button.operator { background: #ff8c42; }
    button.equals { background: #4caf50; }
    button.func { background: #44476a; color: #ffd166; }
    button.span-two { grid-column: span 2; }
  </style>
</head>
<body>
  <div class="calculator">
    <div class="display">
      <div class="history" id="history"></div>
      <div class="current" id="current">0</div>
    </div>
    <div class="buttons">
      <button class="func" data-action="clear">C</button>
      <button class="func" data-action="sign">±</button>
      <button class="func" data-action="percent">%</button>
      <button class="operator" data-op="/">÷</button>

      <button data-num="7">7</button>
      <button data-num="8">8</button>
      <button data-num="9">9</button>
      <button class="operator" data-op="*">×</button>

      <button data-num="4">4</button>
      <button data-num="5">5</button>
      <button data-num="6">6</button>
      <button class="operator" data-op="-">−</button>

      <button data-num="1">1</button>
      <button data-num="2">2</button>
      <button data-num="3">3</button>
      <button class="operator" data-op="+">+</button>

      <button class="span-two" data-num="0">0</button>
      <button data-action="decimal">.</button>
      <button class="equals" data-action="equals">=</button>
    </div>
  </div>

  <script>
    const currentEl = document.getElementById('current');
    const historyEl = document.getElementById('history');

    let current = '0';      // 현재 입력 중인 숫자
    let previous = null;    // 이전 피연산자
    let operator = null;    // 선택된 연산자
    let resetNext = false;  // 다음 숫자 입력 시 화면 초기화 여부

    const opSymbols = { '+': '+', '-': '−', '*': '×', '/': '÷' };

    function updateDisplay() {
      currentEl.textContent = current;
      historyEl.textContent =
        previous !== null && operator
          ? `${formatNumber(previous)} ${opSymbols[operator]}`
          : '';
    }

    function formatNumber(n) {
      const num = Number(n);
      if (!isFinite(num)) return '오류';
      // 너무 긴 소수는 잘라서 표시
      return parseFloat(num.toPrecision(12)).toString();
    }

    function inputNumber(d) {
      if (resetNext) { current = '0'; resetNext = false; }
      current = current === '0' ? d : current + d;
      updateDisplay();
    }

    function inputDecimal() {
      if (resetNext) { current = '0'; resetNext = false; }
      if (!current.includes('.')) current += '.';
      updateDisplay();
    }

    function chooseOperator(op) {
      if (operator && !resetNext) compute();
      previous = current;
      operator = op;
      resetNext = true;
      updateDisplay();
    }

    function compute() {
      if (operator === null || previous === null) return;
      const a = parseFloat(previous);
      const b = parseFloat(current);
      let result;
      switch (operator) {
        case '+': result = a + b; break;
        case '-': result = a - b; break;
        case '*': result = a * b; break;
        case '/':
          result = b === 0 ? '0으로 나눌 수 없음' : a / b;
          break;
      }
      current = typeof result === 'number' ? formatNumber(result) : result;
      previous = null;
      operator = null;
      resetNext = true;
      historyEl.textContent = '';
      currentEl.textContent = current;
    }

    function clearAll() {
      current = '0';
      previous = null;
      operator = null;
      resetNext = false;
      updateDisplay();
    }

    function toggleSign() {
      if (current === '0') return;
      current = current.startsWith('-') ? current.slice(1) : '-' + current;
      updateDisplay();
    }

    function percent() {
      current = formatNumber(parseFloat(current) / 100);
      updateDisplay();
    }

    // 버튼 클릭 처리
    document.querySelector('.buttons').addEventListener('click', (e) => {
      const t = e.target;
      if (t.dataset.num !== undefined) inputNumber(t.dataset.num);
      else if (t.dataset.op !== undefined) chooseOperator(t.dataset.op);
      else if (t.dataset.action === 'decimal') inputDecimal();
      else if (t.dataset.action === 'equals') compute();
      else if (t.dataset.action === 'clear') clearAll();
      else if (t.dataset.action === 'sign') toggleSign();
      else if (t.dataset.action === 'percent') percent();
    });

    // 키보드 입력 지원
    document.addEventListener('keydown', (e) => {
      const k = e.key;
      if (k >= '0' && k <= '9') inputNumber(k);
      else if (k === '.') inputDecimal();
      else if (['+', '-', '*', '/'].includes(k)) chooseOperator(k);
      else if (k === 'Enter' || k === '=') { e.preventDefault(); compute(); }
      else if (k === 'Escape') clearAll();
      else if (k === '%') percent();
    });

    updateDisplay();
  </script>
</body>
</html>
